
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;color:#fff;background:#000}
#app{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center}
.bg-layer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.sky-svg{position:absolute;top:0;left:0;width:100%;height:100%}
.doggo{position:fixed;bottom:70px;right:6px;z-index:20;cursor:pointer;animation:dogFloat 3s ease-in-out infinite;width:72px}
@keyframes dogFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-7px) rotate(2deg)}}
.speech{position:absolute;bottom:76px;right:0;background:#fffdf5;color:#333;font-size:10px;padding:5px 9px;border-radius:10px;border-bottom-right-radius:2px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3);display:none;border:1px solid #f0e0c0}
.doggo:hover .speech{display:block}
#content{position:relative;z-index:10;width:100%;max-width:400px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 120px}
#startScreen{text-align:center;padding-top:50px;width:100%}
.title-badge{background:rgba(255,200,50,.25);border:1px solid rgba(255,200,50,.6);color:#ffd700;font-size:11px;padding:4px 14px;border-radius:20px;display:inline-block;margin-bottom:14px;letter-spacing:2px;font-weight:700}
.main-title{font-family:'Noto Serif KR',serif;font-size:34px;font-weight:900;line-height:1.2;color:#fff;text-shadow:0 0 30px rgba(255,180,50,.5);margin-bottom:8px}
.main-title span{color:#ffd700}
.subtitle{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:28px;line-height:1.6}
.palace-card{background:rgba(0,0,0,.4);border:1px solid rgba(255,200,50,.3);border-radius:16px;padding:18px;margin:0 auto 28px;width:100%}
.range-text{font-size:11px;color:#ffd700;margin-bottom:10px;font-weight:700;letter-spacing:1px}
.topics{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.topic-tag{background:rgba(255,200,50,.1);border:1px solid rgba(255,200,50,.35);color:rgba(255,255,255,.85);font-size:11px;padding:3px 9px;border-radius:20px}
.start-btn{background:#ffd700;color:#1a0800;font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:18px;border:none;padding:16px 48px;border-radius:50px;cursor:pointer;box-shadow:0 4px 20px rgba(255,200,50,.5);transition:all .2s;letter-spacing:1px;width:100%}
.start-btn:hover{transform:translateY(-2px);background:#ffe033}
.start-btn:active{transform:scale(.98)}
#quizScreen{display:none;width:100%;padding-top:20px}
.progress-wrap{margin-bottom:18px;width:100%}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.7);margin-bottom:7px}
.prog-bar{height:7px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#c8860a,#ffd700);border-radius:4px;transition:width .5s ease}
.q-card{background:rgba(0,0,0,.55);border:1px solid rgba(255,200,50,.22);border-radius:20px;padding:22px 18px;margin-bottom:18px}
.q-era{font-size:11px;color:#ffd700;letter-spacing:1px;margin-bottom:6px;font-weight:700}
.q-unit{font-size:10px;color:rgba(255,200,50,.6);margin-bottom:10px}
.q-text{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;line-height:1.8;color:#fff}
.ox-btns{display:flex;gap:12px;margin-bottom:16px}
.ox-btn{flex:1;height:80px;border-radius:16px;border:2px solid transparent;cursor:pointer;font-size:42px;display:flex;align-items:center;justify-content:center;transition:all .2s;background:rgba(255,255,255,.06)}
#oBtn{border-color:rgba(50,210,100,.45);color:#28e070}
#xBtn{border-color:rgba(230,60,60,.45);color:#e83c3c}
.ox-btn:hover{transform:scale(1.05)}
.ox-btn:active{transform:scale(.95)}
.ox-btn.sel-o{background:rgba(50,210,100,.22);border-color:#28e070;box-shadow:0 0 22px rgba(50,210,100,.35)}
.ox-btn.sel-x{background:rgba(230,60,60,.22);border-color:#e83c3c;box-shadow:0 0 22px rgba(230,60,60,.35)}
.ox-btn.dis{pointer-events:none;opacity:.55}
.feedback{border-radius:14px;padding:16px;margin-bottom:14px;display:none;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.feedback.ok{background:rgba(40,180,90,.14);border:1px solid rgba(40,180,90,.4)}
.feedback.ng{background:rgba(220,50,50,.14);border:1px solid rgba(220,50,50,.4)}
.fb-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.fb-icon{font-size:20px}
.fb-lbl{font-size:14px;font-weight:900}
.ok .fb-lbl{color:#28e070}
.ng .fb-lbl{color:#e83c3c}
.fb-desc{font-size:13px;color:rgba(255,255,255,.88);line-height:1.7}
.fb-unit{font-size:11px;color:rgba(255,200,50,.85);margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.1);font-weight:700}
.fb-ans{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px}
.next-btn{width:100%;padding:15px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:900;border-radius:14px;cursor:pointer;transition:all .2s;letter-spacing:1px;display:none;border:none}
.next-btn.ok{background:#28e070;color:#003318;box-shadow:0 4px 16px rgba(40,220,110,.4)}
.next-btn.ng{background:#e83c3c;color:#fff;box-shadow:0 4px 16px rgba(230,60,60,.35)}
.next-btn:hover{transform:translateY(-2px);filter:brightness(1.1)}
.next-btn:active{transform:scale(.98)}
#resultScreen{display:none;width:100%;text-align:center;padding-top:36px}
.res-emoji{font-size:64px;margin-bottom:14px;animation:pop .5s ease}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
.res-title{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:900;margin-bottom:6px}
.res-score{font-size:56px;font-weight:900;color:#ffd700;font-family:'Noto Serif KR',serif;margin:6px 0}
.res-label{font-size:13px;color:rgba(255,255,255,.5)}
.res-grade{font-size:13px;margin:18px 0;padding:14px 20px;border-radius:12px;font-weight:700;line-height:1.5}
.res-review{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px;margin:16px 0;text-align:left;max-height:320px;overflow-y:auto}
.ri{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:12px;line-height:1.6}
.ri:last-child{border-bottom:none}
.ri-q{color:rgba(255,255,255,.82);margin-bottom:4px;font-size:12px}
.ri-ok{color:#28e070;font-weight:700}
.ri-ng{color:#e83c3c;font-weight:700}
.ri-exp{color:rgba(255,255,255,.5);font-size:11px;margin-top:3px}
.ri-unit{color:rgba(255,200,50,.75);font-size:11px;font-weight:700;margin-top:2px}
.retry-btn{background:#ffd700;color:#1a0800;font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:16px;border:none;padding:14px 40px;border-radius:50px;cursor:pointer;margin-top:8px;width:100%}
.retry-btn:hover{background:#ffe033;transform:translateY(-2px)}
</style>

<script>
const THEMES={
  morning:{id:'morning',label:'🌅 아침',skyColors:['#1a0530','#7a3060','#c05030','#e87030']},
  day:{id:'day',label:'☀️ 낮',skyColors:['#2266aa','#3388cc','#66aadd','#99ccee']},
  night:{id:'night',label:'🌙 밤',skyColors:['#0d0522','#160840','#1e0a3c','#28083a']},
  dawn:{id:'dawn',label:'🌃 새벽',skyColors:['#0a0318','#180630','#2a0840','#1a0530']}
};
function getThemeKey(i){return i<=2?'morning':i<=5?'day':i<=8?'night':'dawn'}

function applySky(i){
  const tk=getThemeKey(i),th=THEMES[tk];
  const svg=document.getElementById('skySvg');
  let dd=svg.querySelector('#_gd');
  if(!dd){dd=document.createElementNS('http://www.w3.org/2000/svg','defs');dd.id='_gd';svg.insertBefore(dd,svg.firstChild)}
  dd.innerHTML=Object.values(THEMES).map(t=>`<linearGradient id="sg_${t.id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${t.skyColors[0]}"/><stop offset="33%" stop-color="${t.skyColors[1]}"/><stop offset="66%" stop-color="${t.skyColors[2]}"/><stop offset="100%" stop-color="${t.skyColors[3]}"/></linearGradient>`).join('');
  document.getElementById('skyR').setAttribute('fill',`url(#sg_${tk})`);
  const isMorning=tk==='morning',isDay=tk==='day',isNight=tk==='night',isDawn=tk==='dawn';
  document.getElementById('starsG').setAttribute('opacity',(isNight||isDawn)?'1':'0');
  document.getElementById('sunC').setAttribute('opacity',isMorning?'0.6':isDay?'1':'0');
  document.getElementById('moonC').setAttribute('opacity',(isNight||isDawn)?'1':'0');
  document.getElementById('cloudsDay').setAttribute('opacity',isDay?'1':isMorning?'0.5':'0');
  document.getElementById('cloudsDawn').setAttribute('opacity',isDawn?'1':'0');
  if(isMorning){document.getElementById('sunC').setAttribute('cy','370');document.getElementById('sunC').setAttribute('cx','200')}
  else{document.getElementById('sunC').setAttribute('cy','80');document.getElementById('sunC').setAttribute('cx','310')}
}

const allQ=[
  /* ── 개항기 ── */
  {era:"개항기",unit:"Ⅲ-1. 문호 개방과 개화 정책",

let questions=[],cur=0,score=0,answers=[];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function startQuiz(){
  questions=shuffle([...allQ]).slice(0,10);
  cur=0;score=0;answers=[];
  showScr('quizScreen');
  applySky(0);
  loadQ();
}

function showScr(id){
  ['startScreen','quizScreen','resultScreen'].forEach(s=>{
    document.getElementById(s).style.display=s===id?'block':'none';
  });
}

function getThemeKey(i){return i<=2?'morning':i<=5?'day':i<=8?'night':'dawn'}
function applySky(i){
  const tk=getThemeKey(i);
  const sky=document.getElementById('skySvg');
  let dd=sky.querySelector('#_gd');
  if(!dd){dd=document.createElementNS('http://www.w3.org/2000/svg','defs');dd.id='_gd';sky.insertBefore(dd,sky.firstChild)}
  const THEMES={
    morning:{skyColors:['#1a0530','#7a3060','#c05030','#e87030']},
    day:{skyColors:['#2266aa','#3388cc','#66aadd','#99ccee']},
    night:{skyColors:['#0d0522','#160840','#1e0a3c','#28083a']},
    dawn:{skyColors:['#0a0318','#180630','#2a0840','#1a0530']}
  };
  dd.innerHTML=Object.entries(THEMES).map(([k,t])=>`<linearGradient id="sg_${k}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${t.skyColors[0]}"/><stop offset="33%" stop-color="${t.skyColors[1]}"/><stop offset="66%" stop-color="${t.skyColors[2]}"/><stop offset="100%" stop-color="${t.skyColors[3]}"/></linearGradient>`).join('');
  document.getElementById('skyR').setAttribute('fill',`url(#sg_${tk})`);
  const isMo=tk==='morning',isDa=tk==='day',isNi=tk==='night',isDw=tk==='dawn';
  document.getElementById('starsG').setAttribute('opacity',(isNi||isDw)?'1':'0');
  document.getElementById('sunC').setAttribute('opacity',isMo?'0.6':isDa?'1':'0');
  document.getElementById('moonC').setAttribute('opacity',(isNi||isDw)?'1':'0');
  document.getElementById('cloudsDay').setAttribute('opacity',isDa?'1':isMo?'0.5':'0');
  document.getElementById('cloudsDawn').setAttribute('opacity',isDw?'1':'0');
  if(isMo){document.getElementById('sunC').setAttribute('cy','370');document.getElementById('sunC').setAttribute('cx','200')}
  else{document.getElementById('sunC').setAttribute('cy','80');document.getElementById('sunC').setAttribute('cx','310')}
}

const themeLabel={morning:'🌅 아침',day:'☀️ 낮',night:'🌙 밤',dawn:'🌃 새벽'};

function loadQ(){
  const q=questions[cur];
  document.getElementById('qNum').textContent=`문제 ${cur+1} / 10`;
  document.getElementById('qScore').textContent=`점수: ${score}`;
  document.getElementById('progFill').style.width=`${(cur+1)*10}%`;
  document.getElementById('qEra').textContent=`${q.era}  ·  ${themeLabel[getThemeKey(cur)]}`;
  document.getElementById('qUnit').textContent=`📖 ${q.unit}`;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('feedback').style.display='none';
  const nb=document.getElementById('nextBtn');
  nb.style.display='none';nb.className='next-btn';
  const ob=document.getElementById('oBtn'),xb=document.getElementById('xBtn');
  ob.className='ox-btn';xb.className='ox-btn';
}

function answer(isO){
  const q=questions[cur];
  const ok=isO===q.ans;
  if(ok) score++;
  answers.push({q:q.q,era:q.era,unit:q.unit,userAns:isO,ok,exp:q.exp,corr:q.ans});
  const ob=document.getElementById('oBtn'),xb=document.getElementById('xBtn');
  ob.classList.add(isO?'sel-o':'dis');
  xb.classList.add(!isO?'sel-x':'dis');
  ob.classList.add('dis');xb.classList.add('dis');
  const fb=document.getElementById('feedback');
  fb.className='feedback '+(ok?'ok':'ng');
  document.getElementById('fbIcon').textContent=ok?'🎉':'😢';
  document.getElementById('fbLbl').textContent=ok?'정답입니다!':'틀렸습니다';
  document.getElementById('fbDesc').textContent=q.exp;
  document.getElementById('fbUnit').textContent=`📖 ${q.unit}`;
  document.getElementById('fbAns').textContent=`정답: ${q.ans?'⭕':'❌'}  |  내 답변: ${isO?'⭕':'❌'}`;
  fb.style.display='block';
  const nb=document.getElementById('nextBtn');
  nb.className='next-btn '+(ok?'ok':'ng');
  nb.textContent=cur<9?`다음 문제 (${cur+2}/10) →`:'결과 보기 🏆';
  nb.style.display='block';
}

function nextQ(){
  cur++;
  if(cur>=10){showResult();return}
  applySky(cur);
  loadQ();
}

function showResult(){
  showScr('resultScreen');
  applySky(9);
  let emoji,title,grade,gs;
  if(score===10){emoji='🏆';title='역사 마스터 달성!';grade='100점 만점! 독립운동가의 정신을 온몸으로 이어받은 역사의 주인공입니다!';gs='background:rgba(255,200,50,.2);border:1px solid rgba(255,200,50,.5);color:#ffd700'}
  else if(score>=8){emoji='🎖️';title='우수한 역사 실력!';grade=`${score*10}점 — 훌륭합니다! 조금만 더 공부하면 만점도 가능합니다.`;gs='background:rgba(40,200,100,.15);border:1px solid rgba(40,200,100,.4);color:#28e070'}
  else if(score>=6){emoji='📚';title='역사 공부 진행 중!';grade=`${score*10}점 — 괜찮아요! 틀린 문제를 교과서에서 복습해 보세요.`;gs='background:rgba(80,140,255,.15);border:1px solid rgba(80,140,255,.4);color:#7cb4ff'}
  else if(score>=4){emoji='💪';title='더 열심히 해보자!';grade=`${score*10}점 — 조금 더 분발이 필요해요. 다시 도전!`;gs='background:rgba(255,140,40,.15);border:1px solid rgba(255,140,40,.4);color:#ff9640'}
  else{emoji='🔥';title='교과서를 펼쳐라!';grade=`${score*10}점 — 개항기부터 교과서를 꼼꼼히 복습하세요!`;gs='background:rgba(220,50,50,.15);border:1px solid rgba(220,50,50,.4);color:#e83c3c'}
  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resTitle').textContent=title;
  document.getElementById('resScore').textContent=`${score} / 10`;
  const rg=document.getElementById('resGrade');
  rg.textContent=grade;rg.style.cssText=gs+';border-radius:12px;padding:14px 20px';
  document.getElementById('resReview').innerHTML=
    '<div style="font-size:11px;font-weight:700;color:rgba(255,200,50,.7);margin-bottom:10px;letter-spacing:1px">📋 전체 복습</div>'+
    answers.map((a,i)=>`<div class="ri"><div class="ri-q">${i+1}. [${a.era}] ${a.q}</div><span class="${a.ok?'ri-ok':'ri-ng'}">${a.ok?'✅ 정답':'❌ 오답'}</span> · 내 답: ${a.userAns?'⭕':'❌'} / 정답: ${a.corr?'⭕':'❌'}<div class="ri-exp">${a.exp}</div><div class="ri-unit">📖 ${a.unit}</div></div>`).join('');
}

function restart(){showScr('startScreen');applySky(0)}
applySky(0);
</script>
